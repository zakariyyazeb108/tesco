<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Plain Editor</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bg: #1e1e1e;
      --bg-upper: #3c3c3c;
      --bg-input: #252526;
      --border: #3e3e42;
      --text: #cccccc;
      --text-dim: #858585;
      --accent: #0078d4;
      --accent-hover: #1a86d8;
    }
    body.light {
      --bg: #f3f3f3;
      --bg-upper: #e8e8e8;
      --bg-input: #ffffff;
      --border: #d4d4d4;
      --text: #1a1a1a;
      --text-dim: #616161;
    }
    html, body { height: 100%; }
    body {
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Title bar */
    .titlebar {
      height: 32px;
      background: var(--bg-upper);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 10px;
      gap: 12px;
      flex-shrink: 0;
      -webkit-app-region: drag;
      user-select: none;
    }
    .titlebar h1 {
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
    }
    .titlebar-actions {
      margin-left: auto;
      display: flex;
      gap: 6px;
      -webkit-app-region: no-drag;
    }
    .titlebar button {
      font-size: 11px;
      padding: 4px 10px;
      border: 1px solid var(--border);
      background: var(--bg);
      color: var(--text);
      border-radius: 3px;
      cursor: pointer;
      font-family: inherit;
    }
    .titlebar button:hover {
      background: var(--accent);
      border-color: var(--accent);
      color: #fff;
    }

    /* Menu strip */
    .menubar {
      display: flex;
      gap: 4px;
      padding: 4px 8px;
      background: var(--bg);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .menubar button {
      font-size: 12px;
      padding: 4px 10px;
      border: none;
      background: transparent;
      color: var(--text);
      cursor: pointer;
      border-radius: 3px;
      font-family: inherit;
    }
    .menubar button:hover { background: rgba(128,128,128,.15); }

    /* Editor wrap */
    .editor-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-height: 0;
      padding: 0 1px 1px;
    }
    .tab-row {
      display: flex;
      align-items: flex-end;
      gap: 1px;
      background: var(--bg);
      padding: 4px 4px 0;
      flex-shrink: 0;
    }
    .tab {
      font-size: 12px;
      padding: 6px 14px;
      background: var(--bg-upper);
      border: 1px solid var(--border);
      border-bottom: none;
      border-radius: 4px 4px 0 0;
      color: var(--text-dim);
      cursor: pointer;
      max-width: 180px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .tab.active {
      background: var(--bg-input);
      color: var(--text);
      margin-bottom: -1px;
      padding-bottom: 7px;
    }
    .tab.new-tab {
      padding: 6px 10px;
      min-width: auto;
    }

    .editor-panel {
      flex: 1;
      display: flex;
      min-height: 0;
      border: 1px solid var(--border);
      background: var(--bg-input);
    }
    textarea.editor {
      flex: 1;
      width: 100%;
      min-height: 200px;
      resize: none;
      border: none;
      outline: none;
      padding: 12px 14px;
      font-family: Consolas, "Courier New", monospace;
      font-size: 14px;
      line-height: 1.5;
      background: var(--bg-input);
      color: var(--text);
      tab-size: 4;
    }

    /* Status bar */
    .statusbar {
      height: 24px;
      background: var(--accent);
      color: #fff;
      font-size: 11px;
      display: flex;
      align-items: center;
      padding: 0 12px;
      gap: 16px;
      flex-shrink: 0;
    }
    .statusbar span { opacity: 0.95; }

    input[type="file"] { display: none; }

    .hint {
      font-size: 11px;
      color: var(--text-dim);
      padding: 8px 12px;
      border-top: 1px solid var(--border);
      flex-shrink: 0;
    }
  </style>
</head>
<body>
  <header class="titlebar">
    <h1>Plain Editor</h1>
    <span style="font-size:11px;color:var(--text-dim)">No highlighting · No debugger · Just text</span>
    <div class="titlebar-actions">
      <button type="button" id="btnTheme" title="Switch theme">Theme</button>
    </div>
  </header>

  <nav class="menubar">
    <button type="button" id="mNew">New file</button>
    <button type="button" id="mOpen">Open…</button>
    <button type="button" id="mSave">Save</button>
  </nav>

  <div class="editor-wrap">
    <div class="tab-row" id="tabs"></div>
    <div class="editor-panel">
      <textarea class="editor" id="editor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
    </div>
    <p class="hint">Tip: Tab inserts spaces. Everything is plain text — what you type is what you get.</p>
  </div>

  <footer class="statusbar">
    <span id="stLines">Lines: 1</span>
    <span id="stChars">Characters: 0</span>
    <span id="stName" style="margin-left:auto">Untitled</span>
  </footer>

  <input type="file" id="fileOpen" accept="text/*,.md,.json,.html,.css,.js,.txt">

  <script>
(function () {
  var tabs = [{ id: 1, name: "Untitled-1", content: "" }];
  var activeId = 1;
  var nextId = 2;

  var elTabs = document.getElementById("tabs");
  var elEditor = document.getElementById("editor");
  var elFile = document.getElementById("fileOpen");
  var stLines = document.getElementById("stLines");
  var stChars = document.getElementById("stChars");
  var stName = document.getElementById("stName");

  function activeTab() {
    return tabs.find(function (t) { return t.id === activeId; });
  }

  function renderTabs() {
    elTabs.innerHTML = "";
    tabs.forEach(function (t) {
      var btn = document.createElement("button");
      btn.type = "button";
      btn.className = "tab" + (t.id === activeId ? " active" : "");
      btn.textContent = t.name;
      btn.addEventListener("click", function () { switchTab(t.id); });
      elTabs.appendChild(btn);
    });
    var plus = document.createElement("button");
    plus.type = "button";
    plus.className = "tab new-tab";
    plus.textContent = "+";
    plus.title = "New tab";
    plus.addEventListener("click", newFile);
    elTabs.appendChild(plus);
  }

  function switchTab(id) {
    var cur = activeTab();
    if (cur) cur.content = elEditor.value;
    activeId = id;
    var t = activeTab();
    elEditor.value = t ? t.content : "";
    renderTabs();
    updateStatus();
    elEditor.focus();
  }

  function newFile() {
    var cur = activeTab();
    if (cur) cur.content = elEditor.value;
    var id = nextId++;
    var n = { id: id, name: "Untitled-" + id, content: "" };
    tabs.push(n);
    activeId = n.id;
    elEditor.value = "";
    renderTabs();
    updateStatus();
    elEditor.focus();
  }

  function updateStatus() {
    var text = elEditor.value;
    var lines = text.length === 0 ? 1 : text.split(/\r\n|\r|\n/).length;
    stLines.textContent = "Lines: " + lines;
    stChars.textContent = "Characters: " + text.length;
    var t = activeTab();
    if (t) stName.textContent = t.name;
  }

  elEditor.addEventListener("input", updateStatus);

  document.getElementById("mNew").addEventListener("click", function () {
    newFile();
  });

  document.getElementById("mOpen").addEventListener("click", function () {
    elFile.click();
  });

  elFile.addEventListener("change", function () {
    var f = elFile.files[0];
    if (!f) return;
    var reader = new FileReader();
    reader.onload = function () {
      var cur = activeTab();
      if (cur) cur.content = elEditor.value;
      var name = f.name.replace(/[<>:"/\\|?*]/g, "_");
      var n = { id: nextId++, name: name, content: String(reader.result || "") };
      tabs.push(n);
      activeId = n.id;
      elEditor.value = n.content;
      renderTabs();
      updateStatus();
      elEditor.focus();
    };
    reader.readAsText(f);
    elFile.value = "";
  });

  document.getElementById("mSave").addEventListener("click", function () {
    var t = activeTab();
    if (!t) return;
    t.content = elEditor.value;
    var blob = new Blob([t.content], { type: "text/plain;charset=utf-8" });
    var a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = t.name.indexOf(".") > 0 ? t.name : t.name + ".txt";
    a.click();
    URL.revokeObjectURL(a.href);
    renderTabs();
  });

  document.getElementById("btnTheme").addEventListener("click", function () {
    document.body.classList.toggle("light");
    try {
      localStorage.setItem("plain-editor-theme", document.body.classList.contains("light") ? "light" : "dark");
    } catch (e) {}
  });
  try {
    if (localStorage.getItem("plain-editor-theme") === "light") document.body.classList.add("light");
  } catch (e) {}

  renderTabs();
  updateStatus();
})();
  </script>
</body>
</html>
